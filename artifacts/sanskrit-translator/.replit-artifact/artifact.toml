kind = "web"
previewPath = "/"
title = "Sanskrit Translator"
version = "1.0.0"
id = "artifacts/sanskrit-translator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25362

[services.development]
run = "pnpm --filter @workspace/sanskrit-translator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sanskrit-translator", "run", "build" ]
publicDir = "artifacts/sanskrit-translator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25362"
BASE_PATH = "/"

[[services]]
name = "python-api"
paths = [ "/py-api" ]
localPort = 8000

[services.development]
run = "cd /home/runner/workspace && python3 services/python-api/main.py"

[services.env]
PORT = "8000"
